<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Mostruário Virtual M.Q.R.</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>

    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    .titulo {
      position: absolute;
      top: 15px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 32px;
      z-index: 10;
      text-shadow: 2px 2px 8px black;
    }

    .info {
      position: absolute;
      bottom: 15px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 18px;
      z-index: 10;
      text-shadow: 2px 2px 8px black;
    }

  </style>
</head>

<body>

<div class="titulo">
  Mostruário Virtual M.Q.R
</div>

<div class="info">
  Clique na tela para trocar o objeto
</div>

<a-scene background="color: #0d0d0d">

  <!-- ================================= -->
  <!-- LUZES -->
  <!-- ================================= -->

  <a-light
    type="ambient"
    intensity="0.7">
  </a-light>

  <a-light
    type="directional"
    position="2 5 3"
    intensity="2">
  </a-light>

  <a-light
    type="point"
    position="0 3 2"
    intensity="1.5">
  </a-light>

  <!-- ================================= -->
  <!-- CHÃO -->
  <!-- ================================= -->

  <a-plane
    rotation="-90 0 0"
    width="20"
    height="20"
    color="#222">
  </a-plane>

  <!-- ================================= -->
  <!-- PEDESTAL -->
  <!-- ================================= -->

  <a-cylinder
    position="0 0.6 -3"
    radius="1.3"
    height="0.8"
    color="#555">
  </a-cylinder>

  <!-- ================================= -->
  <!-- VITRINE CORRIGIDA -->
  <!-- ================================= -->

  <!-- Frente -->
  <a-box
    position="0 2.55 -3.95"
    width="3"
    height="4.7"
    depth="0.03"
    opacity="0.15"
    color="#99ccff">
  </a-box>

  <!-- Trás -->
  <a-box
    position="0 2.55 -2.05"
    width="3"
    height="4.7"
    depth="0.03"
    opacity="0.08"
    color="#99ccff">
  </a-box>

  <!-- Esquerda -->
  <a-box
    position="-1.5 2.55 -3"
    width="0.03"
    height="4.7"
    depth="2"
    opacity="0.12"
    color="#99ccff">
  </a-box>

  <!-- Direita -->
  <a-box
    position="1.5 2.55 -3"
    width="0.03"
    height="4.7"
    depth="2"
    opacity="0.12"
    color="#99ccff">
  </a-box>

  <!-- Topo -->
  <a-box
    position="0 4.95 -3"
    width="3.1"
    height="0.12"
    depth="2.1"
    color="#444">
  </a-box>

  <!-- Base -->
  <a-box
    position="0 0.15 -3"
    width="3.1"
    height="0.3"
    depth="2.1"
    color="#444">
  </a-box>

  <!-- ================================= -->
  <!-- TEXTO DO NOME -->
  <!-- ================================= -->

  <a-text
    id="nomeObjeto"
    value="Estátua"
    position="0 5.7 -3"
    align="center"
    color="white"
    width="8">
  </a-text>

  <!-- ================================= -->
  <!-- DESCRIÇÃO -->
  <!-- ================================= -->

  <a-text
    id="descricaoObjeto"
    value="Estátua mulher com vaso\nBragança - PA"
    position="3 3 -3"
    align="left"
    color="white"
    width="4">
  </a-text>

  <!-- ================================= -->
  <!-- OBJETOS -->
  <!-- ================================= -->

  <!-- ESTÁTUA -->
  <a-entity
    id="obj1"
    gltf-model="etatua.glb"
    position="0 0.9 -3"
    scale="1.4 1.4 1.4"
    visible="true"
    animation="
      property: rotation;
      to: 0 360 0;
      loop: true;
      dur: 12000;
      easing: linear">
  </a-entity>

  <!-- VASO 1 -->
  <a-entity
    id="obj6"
    gltf-model="vaso1.glb"
    position="0 1 -3"
    scale="5 5 5"
    visible="false"
    animation="
      property: rotation;
      to: 0 360 0;
      loop: true;
      dur: 12000;
      easing: linear">
  </a-entity>

  <!-- VASO 2 -->
  <a-entity
    id="obj2"
    gltf-model="vaso2.glb"
    position="0 1 -3"
    scale="5 5 5"
    visible="false"
    animation="
      property: rotation;
      to: 0 360 0;
      loop: true;
      dur: 12000;
      easing: linear">
  </a-entity>

  <!-- VASO 3 -->
  <a-entity
    id="obj3"
    gltf-model="vaso3.glb"
    position="0 1 -3"
    scale="5 5 5"
    visible="false"
    animation="
      property: rotation;
      to: 0 360 0;
      loop: true;
      dur: 12000;
      easing: linear">
  </a-entity>

  <!-- SOFÁ -->
  <a-entity
    id="obj4"
    gltf-model="sofa.glb"
    position="0 0.7 -3"
    scale="1.3 1.3 1.3"
    visible="false"
    animation="
      property: rotation;
      to: 0 360 0;
      loop: true;
      dur: 12000;
      easing: linear">
  </a-entity>

  <!-- FLOR -->
  <a-entity
    id="obj5"
    gltf-model="flor.glb"
    position="0 1 -3"
    scale="1.5 1.5 1.5"
    visible="false"
    animation="
      property: rotation;
      to: 0 360 0;
      loop: true;
      dur: 12000;
      easing: linear">
  </a-entity>

  <!-- CAVALO -->
  <a-entity
    id="obj7"
    gltf-model="cavalo.glb"
    position="0 0.9 -3"
    scale="1.2 1.2 1.2"
    visible="false"
    animation="
      property: rotation;
      to: 0 360 0;
      loop: true;
      dur: 12000;
      easing: linear">
  </a-entity>

  <!-- CADEIRA -->
  <a-entity
    id="obj8"
    gltf-model="cadeira.glb"
    position="0 0.8 -3"
    scale="1.5 1.5 1.5"
    visible="false"
    animation="
      property: rotation;
      to: 0 360 0;
      loop: true;
      dur: 12000;
      easing: linear">
  </a-entity>

  <!-- ================================= -->
  <!-- CÂMERA -->
  <!-- ================================= -->

  <a-entity position="0 1.8 1.5">

    <a-camera>
      <a-cursor color="white"></a-cursor>
    </a-camera>

  </a-entity>

</a-scene>

<!-- ================================= -->
<!-- JAVASCRIPT -->
<!-- ================================= -->

<script>

const objetos = [

  {
    id: "obj1",
    nome: "Estátua",
    descricao: "Estátua mulher com vaso\nBragança - PA"
  },

  {
    id: "obj6",
    nome: "Vaso 1",
    descricao: "Vaso cerâmico Marajoara\nBragança - PA"
  },

  {
    id: "obj2",
    nome: "Vaso 2",
    descricao: "Peça cerimonial indígena\nAbaetetuba - PA"
  },

  {
    id: "obj3",
    nome: "Vaso 3",
    descricao: "Arte cerâmica tradicional\nSoure - PA"
  },

  {
    id: "obj4",
    nome: "Sofá",
    descricao: "Miniatura de mobiliário\nBelém - PA"
  },

  {
    id: "obj5",
    nome: "Flor",
    descricao: "Escultura botânica digital\nCastanhal - PA"
  },

  {
    id: "obj7",
    nome: "Cavalo",
    descricao: "Escultura animal artesanal\nMarajó - PA"
  },

  {
    id: "obj8",
    nome: "Cadeira",
    descricao: "Objeto doméstico modelado\nBelém - PA"
  }

];

let atual = 0;


// =======================================
// MOSTRAR OBJETO
// =======================================

function mostrarObjeto(index) {

  // ESCONDE TODOS
  objetos.forEach(obj => {

    document
      .getElementById(obj.id)
      .setAttribute("visible", false);

  });

  // MOSTRA O ATUAL
  document
    .getElementById(objetos[index].id)
    .setAttribute("visible", true);

  // MUDA NOME
  document
    .getElementById("nomeObjeto")
    .setAttribute("value", objetos[index].nome);

  // MUDA DESCRIÇÃO
  document
    .getElementById("descricaoObjeto")
    .setAttribute("value", objetos[index].descricao);

}


// =======================================
// TROCAR OBJETO COM CLICK
// =======================================

document.addEventListener("click", () => {

  atual++;

  if (atual >= objetos.length) {
    atual = 0;
  }

  mostrarObjeto(atual);

});

</script>

</body>
</html>
