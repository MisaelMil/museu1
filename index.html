<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Galeria Virtual 3D</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    .titulo {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 32px;
      z-index: 10;
      text-shadow: 2px 2px 6px black;
    }

    .info {
      position: absolute;
      bottom: 10px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 18px;
      z-index: 10;
      text-shadow: 2px 2px 6px black;
    }
  </style>
</head>

<body>

  <div class="titulo">
    Museu Virtual Marajoara
  </div>

  <div class="info">
    A / ← = anterior &nbsp;&nbsp;&nbsp; D / → = próximo
  </div>

  <!-- ======================================= -->
  <!-- CENA -->
  <!-- ======================================= -->

  <a-scene background="color: #111">

    <!-- ======================================= -->
    <!-- LUZES -->
    <!-- ======================================= -->

    <a-light
      type="ambient"
      intensity="1.2">
    </a-light>

    <a-light
      type="directional"
      position="2 4 2"
      intensity="2">
    </a-light>

    <a-light
      type="point"
      position="-3 3 0"
      intensity="1">
    </a-light>

    <!-- ======================================= -->
    <!-- CHÃO -->
    <!-- ======================================= -->

    <a-plane
      rotation="-90 0 0"
      width="40"
      height="40"
      color="#444">
    </a-plane>

    <!-- ======================================= -->
    <!-- TEXTO DO OBJETO -->
    <!-- ======================================= -->

    <a-text
      id="nomeObjeto"
      value="Vaso 1"
      position="0 2.5 -3"
      align="center"
      color="white"
      width="8">
    </a-text>

    <!-- ======================================= -->
    <!-- OBJETOS -->
    <!-- ======================================= -->

    <!-- VASO 1 -->
    <a-entity
      id="obj1"
      gltf-model="vaso1.glb"
      position="0 0 -3"
      scale="2 2 2"
      visible="true"
      animation="
        property: rotation;
        to: 0 360 0;
        loop: true;
        dur: 15000">
    </a-entity>

    <!-- VASO 2 -->
    <a-entity
      id="obj2"
      gltf-model="vaso2.glb"
      position="0 0 -3"
      scale="2 2 2"
      visible="false"
      animation="
        property: rotation;
        to: 0 360 0;
        loop: true;
        dur: 15000">
    </a-entity>

    <!-- VASO 3 -->
    <a-entity
      id="obj3"
      gltf-model="vaso3.glb"
      position="0 0 -3"
      scale="2 2 2"
      visible="false"
      animation="
        property: rotation;
        to: 0 360 0;
        loop: true;
        dur: 15000">
    </a-entity>

    <!-- SOFÁ -->
    <a-entity
      id="obj4"
      gltf-model="sofa.glb"
      position="0 0 -4"
      scale="2 2 2"
      visible="false"
      animation="
        property: rotation;
        to: 0 360 0;
        loop: true;
        dur: 15000">
    </a-entity>

    <!-- FLOR -->
    <a-entity
      id="obj5"
      gltf-model="flor.glb"
      position="0 0 -3"
      scale="2 2 2"
      visible="false"
      animation="
        property: rotation;
        to: 0 360 0;
        loop: true;
        dur: 15000">
    </a-entity>

    <!-- ESTÁTUA -->
    <a-entity
      id="obj6"
      gltf-model="etatua.glb"
      position="0 0 -3"
      scale="2 2 2"
      visible="false"
      animation="
        property: rotation;
        to: 0 360 0;
        loop: true;
        dur: 15000">
    </a-entity>

    <!-- CAVALO -->
    <a-entity
      id="obj7"
      gltf-model="cavalo.glb"
      position="0 0 -3"
      scale="2 2 2"
      visible="false"
      animation="
        property: rotation;
        to: 0 360 0;
        loop: true;
        dur: 15000">
    </a-entity>

    <!-- CADEIRA -->
    <a-entity
      id="obj8"
      gltf-model="cadeira.glb"
      position="0 0 -3"
      scale="2 2 2"
      visible="false"
      animation="
        property: rotation;
        to: 0 360 0;
        loop: true;
        dur: 15000">
    </a-entity>

    <!-- ======================================= -->
    <!-- CÂMERA -->
    <!-- ======================================= -->

    <a-entity position="0 1.6 2">

      <a-camera look-controls>

        <a-cursor color="white"></a-cursor>

      </a-camera>

    </a-entity>

  </a-scene>

  <!-- ======================================= -->
  <!-- JAVASCRIPT -->
  <!-- ======================================= -->

  <script>

    const objetos = [

      {
        id: "obj1",
        nome: "Vaso 1"
      },

      {
        id: "obj2",
        nome: "Vaso 2"
      },

      {
        id: "obj3",
        nome: "Vaso 3"
      },

      {
        id: "obj4",
        nome: "Sofá"
      },

      {
        id: "obj5",
        nome: "Flor"
      },

      {
        id: "obj6",
        nome: "Estatua"
      },

      {
        id: "obj7",
        nome: "Cavalo"
      },

      {
        id: "obj8",
        nome: "Cadeira"
      }

    ];

    let atual = 0;

    function mostrarObjeto(index) {

      objetos.forEach(obj => {

        document
          .getElementById(obj.id)
          .setAttribute("visible", false);

      });

      document
        .getElementById(objetos[index].id)
        .setAttribute("visible", true);

      document
        .getElementById("nomeObjeto")
        .setAttribute("value", objetos[index].nome);

    }

    document.addEventListener("keydown", (e) => {

      // Próximo
      if (e.key === "d" || e.key === "ArrowRight") {

        atual++;

        if (atual >= objetos.length) {
          atual = 0;
        }

        mostrarObjeto(atual);
      }

      // Anterior
      if (e.key === "a" || e.key === "ArrowLeft") {

        atual--;

        if (atual < 0) {
          atual = objetos.length - 1;
        }

        mostrarObjeto(atual);
      }

    });

  </script>

</body>

</html>
