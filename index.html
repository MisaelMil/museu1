<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Mostruário 3D Interativo</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: white;
      font-family: Arial, sans-serif;
    }

    .titulo {
      position: absolute;
      top: 15px;
      width: 100%;
      text-align: center;
      color: black;
      font-size: 32px;
      z-index: 10;
    }

    .info {
      position: absolute;
      bottom: 15px;
      width: 100%;
      text-align: center;
      color: black;
      font-size: 18px;
      z-index: 10;
    }
  </style>
</head>

<body>

<div class="titulo">
  Mostruário Virtual
</div>

<div class="info">
  A / ← = anterior &nbsp;&nbsp;&nbsp;
  D / → = próximo &nbsp;&nbsp;&nbsp;
  Arraste o mouse para girar o objeto
</div>

<a-scene background="color: #ffffff">

  <!-- ================================= -->
  <!-- LUZES -->
  <!-- ================================= -->

  <a-light
    type="ambient"
    intensity="1.5">
  </a-light>

  <a-light
    type="directional"
    position="2 5 3"
    intensity="2">
  </a-light>

  <a-light
    type="point"
    position="0 4 2"
    intensity="2">
  </a-light>

  <!-- ================================= -->
  <!-- CHÃO -->
  <!-- ================================= -->

  <a-plane
    rotation="-90 0 0"
    width="20"
    height="20"
    color="#eeeeee">
  </a-plane>

  <!-- ================================= -->
  <!-- PEDESTAL -->
  <!-- ================================= -->

  <a-cylinder
    position="0 0.5 -2"
    radius="1.4"
    height="1"
    color="#777">
  </a-cylinder>

  <!-- ================================= -->
  <!-- VITRINE -->
  <!-- ================================= -->

  <!-- Frente -->
  <a-box
    position="0 3 -2.95"
    width="3"
    height="5.5"
    depth="0.03"
    opacity="0.12"
    color="#88ccff">
  </a-box>

  <!-- Trás -->
  <a-box
    position="0 3 -1.05"
    width="3"
    height="5.5"
    depth="0.03"
    opacity="0.05"
    color="#88ccff">
  </a-box>

  <!-- Esquerda -->
  <a-box
    position="-1.5 3 -2"
    width="0.03"
    height="5.5"
    depth="2"
    opacity="0.10"
    color="#88ccff">
  </a-box>

  <!-- Direita -->
  <a-box
    position="1.5 3 -2"
    width="0.03"
    height="5.5"
    depth="2"
    opacity="0.10"
    color="#88ccff">
  </a-box>

  <!-- Topo -->
  <a-box
    position="0 5.8 -2"
    width="3.1"
    height="0.08"
    depth="2.1"
    color="#999">
  </a-box>

  <!-- Base -->
  <a-box
    position="0 0.55 -2"
    width="3.1"
    height="0.08"
    depth="2.1"
    color="#999">
  </a-box>

  <!-- ================================= -->
  <!-- TEXTO -->
  <!-- ================================= -->

  <a-text
    id="nomeObjeto"
    value="Vaso 1"
    position="0 6.3 -2"
    align="center"
    color="black"
    width="8">
  </a-text>

  <!-- ================================= -->
  <!-- GRUPO DOS OBJETOS -->
  <!-- ================================= -->

  <a-entity id="grupoObjetos">

    <!-- VASO 1 -->
    <a-entity
      id="obj1"
      gltf-model="vaso1.glb"
      position="0 1.3 -2"
      scale="1.6 1.6 1.6"
      visible="true">
    </a-entity>

    <!-- VASO 2 -->
    <a-entity
      id="obj2"
      gltf-model="vaso2.glb"
      position="0 1.3 -2"
      scale="1.6 1.6 1.6"
      visible="false">
    </a-entity>

    <!-- VASO 3 -->
    <a-entity
      id="obj3"
      gltf-model="vaso3.glb"
      position="0 1.3 -2"
      scale="1.6 1.6 1.6"
      visible="false">
    </a-entity>

    <!-- SOFÁ -->
    <a-entity
      id="obj4"
      gltf-model="sofa.glb"
      position="0 1 -2"
      scale="1.3 1.3 1.3"
      visible="false">
    </a-entity>

    <!-- FLOR -->
    <a-entity
      id="obj5"
      gltf-model="flor.glb"
      position="0 1.3 -2"
      scale="1.6 1.6 1.6"
      visible="false">
    </a-entity>

    <!-- ESTÁTUA -->
    <a-entity
      id="obj6"
      gltf-model="esatua.glb"
      position="0 1.2 -2"
      scale="1.5 1.5 1.5"
      visible="false">
    </a-entity>

    <!-- CAVALO -->
    <a-entity
      id="obj7"
      gltf-model="cavalo.glb"
      position="0 1.2 -2"
      scale="1.3 1.3 1.3"
      visible="false">
    </a-entity>

    <!-- CADEIRA -->
    <a-entity
      id="obj8"
      gltf-model="cadeira.glb"
      position="0 1.2 -2"
      scale="1.5 1.5 1.5"
      visible="false">
    </a-entity>

  </a-entity>

  <!-- ================================= -->
  <!-- CÂMERA -->
  <!-- ================================= -->

  <a-entity position="0 2 1">

    <a-camera>

      <a-cursor color="black"></a-cursor>

    </a-camera>

  </a-entity>

</a-scene>

<!-- ================================= -->
<!-- JAVASCRIPT -->
<!-- ================================= -->

<script>

const objetos = [

  { id: "obj1", nome: "Vaso 1" },
  { id: "obj2", nome: "Vaso 2" },
  { id: "obj3", nome: "Vaso 3" },
  { id: "obj4", nome: "Sofá" },
  { id: "obj5", nome: "Flor" },
  { id: "obj6", nome: "Estátua" },
  { id: "obj7", nome: "Cavalo" },
  { id: "obj8", nome: "Cadeira" }

];

let atual = 0;

function mostrarObjeto(index) {

  objetos.forEach(obj => {

    document
      .getElementById(obj.id)
      .setAttribute("visible", false);

  });

  document
    .getElementById(objetos[index].id)
    .setAttribute("visible", true);

  document
    .getElementById("nomeObjeto")
    .setAttribute("value", objetos[index].nome);

}

document.addEventListener("keydown", (e) => {

  // Próximo
  if (e.key === "d" || e.key === "ArrowRight") {

    atual++;

    if (atual >= objetos.length) {
      atual = 0;
    }

    mostrarObjeto(atual);
  }

  // Anterior
  if (e.key === "a" || e.key === "ArrowLeft") {

    atual--;

    if (atual < 0) {
      atual = objetos.length - 1;
    }

    mostrarObjeto(atual);
  }

});


// ======================================
// GIRAR OBJETO COM O MOUSE
// ======================================

let clicando = false;
let ultimoX = 0;

const grupo = document.getElementById("grupoObjetos");

document.addEventListener("mousedown", (e) => {

  clicando = true;
  ultimoX = e.clientX;

});

document.addEventListener("mouseup", () => {

  clicando = false;

});

document.addEventListener("mousemove", (e) => {

  if (!clicando) return;

  let deltaX = e.clientX - ultimoX;

  let rotacao = grupo.getAttribute("rotation");

  rotacao.y += deltaX * 0.5;

  grupo.setAttribute("rotation", rotacao);

  ultimoX = e.clientX;

});

</script>

</body>
</html>
